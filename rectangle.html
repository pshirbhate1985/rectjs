<html>
    <head>
        <title>rectangle</title>
        <style>
            .rectangle {
                border: 1px solid black;
                width: 200px;
                height: 200px;
                margin: auto;
            }
            .button {
                text-align:center ;
                padding: 20px;
                margin: auto;
                width: 200px;
            }
        </style>
    </head>
    <body>
        <h2 style="text-align: center;">Make changes to rectangle</h2>
        <div class="rectangle"></div>
        <div class="button">
            <button onclick="circle()"> make a circle</button>
            <button onclick="hide()">hide</button>
            <button onclick="show()">show</button>
        </div>
        <script>
            let div = document.querySelector(".rectangle");
            function circle(){
                div.style.borderRadius = "50%";
            }
            function hide(){
                div.style.display ="none";
            }
            function show(){
                div.style.display ="block";
            }
            div.onmouseenter = function () { div.style.background = "lavender"; };
            div.onmouseleave = function () { div.style.background = "transparent"; };
        </script>
    </body>
</html>
